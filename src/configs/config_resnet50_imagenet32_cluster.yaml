# Downsampled ImageNet (32x32) benchmark config -- ResNet50 (from scratch, AdamW), cluster variant.
#
# UNVERIFIED PLACEHOLDER -- see config_resnet50_imagenet32.yaml's header for
# the full rationale (num_epochs/freeze_interval copied unchanged from the
# CIFAR cluster config and almost certainly wrong given ImageNet32's ~25x
# larger per-epoch step count). num_epochs: 40 here would mean ~40x a
# ~155k-step epoch -- likely far too long for a single SLURM job's time
# budget as-is. Recompute both against real steps_per_epoch (and probably
# lower num_epochs substantially) once the dataset is staged, before trusting
# any --time budget derived from this file.
#
# val_size: also a placeholder -- see src/data/imagenet32.py's docstring.

# Data
dataset: imagenet32
num_classes: 1000
data_root: dataset/imagenet32
val_size: 10000
seed: 0
batch_size: 128
num_workers: 6

# Training
num_epochs: 40
learning_rate: 3.0e-4
weight_decay: 5.0e-5
early_stopping_patience: 12
output_dir: runs

# Fisher / freeze -- UNVERIFIED placeholders, copied from config_resnet50_cluster.yaml.
fisher_ema_interval: 200
freeze_interval: 7200
fisher_slice_mode: row
fisher_slice_blocks: 4
js_distance_mode: log
chunk_selection_metric: total_variation
js_variance_lambda: -1.0

# W&B (optional, unused by default in this benchmark script)
wandb_project: FisherAdapTune-ImageNet32
