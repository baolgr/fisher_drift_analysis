# CIFAR-10 benchmark config -- ResNet50, cluster variant, SWEEP PROBE:
# js_variance_lambda=-1.3 (less aggressive than the baseline -1.0 run --
# the same direction/magnitude as the ViT sweep's fix_lambda13). See
# config_resnet50_cluster_sweep_lambda04.yaml's header for the full
# rationale on this 4-job bracket. This is the control point that mirrors
# the ViT sweep exactly (same lambda, same metric) -- if ResNet50 is already
# near its accuracy ceiling at -1.0 (unlike ViT, which had headroom), this
# run should show retaining even more params buys little to no further
# accuracy, unlike ViT where it recovered 8.8 points.
#
# Everything else identical to config_resnet50_cluster.yaml (40 epochs,
# freeze_interval=7200, total_variation) -- only js_variance_lambda differs.
#
# run_name -> runs/resnet50_freeze_sweep_lambda13/

# Data
data_root: dataset
seed: 0
batch_size: 128
num_workers: 6

# Training
num_epochs: 40
learning_rate: 3.0e-4
weight_decay: 5.0e-5
early_stopping_patience: 12
output_dir: runs
run_name: resnet50_freeze_sweep_lambda13

# Fisher / freeze -- only js_variance_lambda changed from
# config_resnet50_cluster.yaml.
fisher_ema_interval: 200
freeze_interval: 7200
fisher_slice_mode: row
fisher_slice_blocks: 4
js_distance_mode: log
chunk_selection_metric: total_variation
js_variance_lambda: -1.3

# W&B (optional, unused by default in this benchmark script)
wandb_project: FisherAdapTune-CIFAR10
