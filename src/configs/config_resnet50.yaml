# CIFAR-10 benchmark config -- ResNet50 (from scratch, AdamW)

# Data
dataset: cifar10
num_classes: 10
data_root: dataset
seed: 0
batch_size: 128
num_workers: 2

# Training
num_epochs: 18
learning_rate: 3.0e-4
weight_decay: 5.0e-5
early_stopping_patience: 12
output_dir: runs
# See config_vit_small.yaml -- each freeze event causes a real, temporary
# loss regression while the reduced trainable set re-adapts; patience=6 was
# tuned for the smooth no-freeze curve and stops the freeze run mid-recovery.

# Fisher / freeze -- pure library knobs, see config_vit_small.yaml for the
# full rationale (README's toy smoke-test values, compounding multi-cut
# collapse, and why lambda=-1.0/single-event avoids both without any custom
# trainer code). NOT YET RUN for ResNet50 -- this is a prepared starting
# config carried over from the tuned ViT run, not a verified result.
#
# Same step budget applies unchanged: batch_size/dataset are identical, so
# steps_per_epoch=351, total_steps=6318, and freeze_interval=3200 still
# lands the single cut at ~step 3200 (~epoch 9, same fraction of training).
#
# All convs here use bias=False (BatchNorm follows every conv, per
# resnet_cifar.py), so there's no separate conv-bias tensor to distort the
# freeze ranking -- the small-tensor side of the disparity found on the ViT
# (biases/LayerNorm ~192 elements outscoring weight matrices due to sparse
# JS-histogram sampling noise) is carried instead by BatchNorm's per-channel
# weight/bias (64 elements at the stem/layer1, up to 512 at layer4) against
# conv weights that grow faster (channels^2), so the size gap if anything
# widens at deeper stages -- expect the same qualitative risk, unverified.
# The paper's own Figure 6 shows "Norm All-stages" as the *first* group
# frozen for SAM2 -- a real, intended signal there (pretrained norm stats
# re-stabilize fast during fine-tuning). Whether that holds or inverts (as
# it did on our from-scratch ViT) for from-scratch BatchNorm is untested;
# the printed [Freeze] line at the single cut will show final vs. eligible
# params, and runs/*/metrics_plots/relative_update.png (already wired to
# RESNET50_CIFAR_LAYERS) will show whether the tracked conv layers actually
# keep updating post-freeze, same diagnostic used to catch this on the ViT.
fisher_ema_interval: 200
freeze_interval: 3200
fisher_slice_mode: row
fisher_slice_blocks: 4
js_distance_mode: log
chunk_selection_metric: total_variation
js_variance_lambda: -1.0

# W&B (optional, unused by default in this benchmark script)
wandb_project: FisherAdapTune-CIFAR10
