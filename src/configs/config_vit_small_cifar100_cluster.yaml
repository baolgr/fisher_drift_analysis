# CIFAR-100 benchmark config -- small ViT (from scratch, AdamW), cluster variant.
#
# Same num_epochs 18->40 / num_workers 2->6 / freeze_interval 3200->7200 change
# as config_vit_small_cluster.yaml, for the same reason (steps_per_epoch=351 is
# identical to CIFAR-10's since CIFAR-100 has the same 50k/10k split shape --
# only num_classes differs). NOT YET RUN.

# Data
dataset: cifar100
num_classes: 100
data_root: dataset
seed: 0
batch_size: 128
num_workers: 6

# Model
vit:
  patch_size: 4
  embed_dim: 192
  depth: 6
  num_heads: 3
  mlp_ratio: 4.0
  drop: 0.1

# Training
num_epochs: 40
learning_rate: 3.0e-4
weight_decay: 5.0e-5
early_stopping_patience: 12
output_dir: runs

# Fisher / freeze -- see config_vit_small_cifar100.yaml for the full rationale.
fisher_ema_interval: 200
freeze_interval: 7200
fisher_slice_mode: row
fisher_slice_blocks: 4
js_distance_mode: log
chunk_selection_metric: total_variation
js_variance_lambda: -1.0

# W&B (optional, unused by default in this benchmark script)
wandb_project: FisherAdapTune-CIFAR100
