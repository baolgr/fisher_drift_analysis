# CIFAR-10 benchmark config -- small ViT, cluster variant, FIX ATTEMPT #3: lambda=-1.6.
#
# Same as config_vit_small_cluster_fix_lambda13.yaml but a second, more
# permissive point on the lambda sweep (js_variance_lambda -1.0 -> -1.6,
# threshold = mean - 1.6*std = ~0.170 against the recovered mean=0.5744
# std=0.2527 -- see docs/2026-07-19_vit_cluster_run_curve_analysis.md §6).
# Run alongside _fix_lambda13.yaml (not instead of it) to get two points on
# the retained-fraction-vs-lambda curve in one round of jobs, rather than
# guessing a single value and re-submitting serially against the 2026-07-21
# deadline. Everything else identical to config_vit_small_cluster.yaml.
#
# run_name gives this run its own flat runs/vit_small_freeze_fix_lambda16/
# directory (see src/train.py's run_training) so it can run concurrently with
# the other fix attempts and vit_small_freeze/vit_small_nofreeze without
# colliding, and so scripts/compare_runs.py picks it up directly.

# Data
data_root: dataset
seed: 0
batch_size: 128
num_workers: 6

# Model
vit:
  patch_size: 4
  embed_dim: 192
  depth: 6
  num_heads: 3
  mlp_ratio: 4.0
  drop: 0.1

# Training
num_epochs: 40
learning_rate: 3.0e-4
weight_decay: 5.0e-5
early_stopping_patience: 12
output_dir: runs
run_name: vit_small_freeze_fix_lambda16

# Fisher / freeze -- only js_variance_lambda changed from the validated
# cluster config, see header comment above.
fisher_ema_interval: 200
freeze_interval: 7200
fisher_slice_mode: row
fisher_slice_blocks: 4
js_distance_mode: log
chunk_selection_metric: total_variation
js_variance_lambda: -1.6

# W&B (optional, unused by default in this benchmark script)
wandb_project: FisherAdapTune-CIFAR10
