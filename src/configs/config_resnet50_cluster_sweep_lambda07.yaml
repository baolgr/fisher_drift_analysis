# CIFAR-10 benchmark config -- ResNet50, cluster variant, SWEEP PROBE:
# js_variance_lambda=-0.7 (more aggressive than the baseline -1.0 run, one
# step less extreme than _lambda04). See
# config_resnet50_cluster_sweep_lambda04.yaml's header for the full
# rationale on why this 4-job sweep brackets -1.0 on both sides instead of
# only going less-aggressive (as the ViT fix sweep did) -- the ResNet50
# baseline isn't known to be over-freezing, so the open question is where
# the accuracy cliff actually is, not how to avoid one already observed.
#
# Everything else identical to config_resnet50_cluster.yaml (40 epochs,
# freeze_interval=7200, total_variation) -- only js_variance_lambda differs.
#
# run_name -> runs/resnet50_freeze_sweep_lambda07/

# Data
data_root: dataset
seed: 0
batch_size: 128
num_workers: 6

# Training
num_epochs: 40
learning_rate: 3.0e-4
weight_decay: 5.0e-5
early_stopping_patience: 12
output_dir: runs
run_name: resnet50_freeze_sweep_lambda07

# Fisher / freeze -- only js_variance_lambda changed from
# config_resnet50_cluster.yaml.
fisher_ema_interval: 200
freeze_interval: 7200
fisher_slice_mode: row
fisher_slice_blocks: 4
js_distance_mode: log
chunk_selection_metric: total_variation
js_variance_lambda: -0.7

# W&B (optional, unused by default in this benchmark script)
wandb_project: FisherAdapTune-CIFAR10
