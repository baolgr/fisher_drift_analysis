# CIFAR-10 benchmark config -- small ViT (from scratch, AdamW), cluster variant.
#
# Differences from config_vit_small.yaml (the locally-validated config), and why:
#   - num_epochs 18 -> 40: the local run was a short pipeline-validation schedule
#     (see CLAUDE.md); this is the real experimentation run, on H100s fast enough
#     that ~2.2x the epochs still finishes well within a single job's time limit.
#   - freeze_interval 3200 -> 7200: MUST scale with num_epochs, not stay fixed --
#     steps_per_epoch is unchanged (351, same batch_size/dataset), so total_steps
#     goes 6318 -> 14040. The single-freeze-event design requires
#     total_steps/2 < freeze_interval < total_steps (see the long comment in
#     config_vit_small.yaml on why *exactly one* event, not more, is load-bearing
#     -- multi-event compounding is what caused the v0-v3 collapses in
#     docs/fisheradaptune_freeze_experiments.md). 7200 preserves the same ~51%
#     fraction-of-training timing as the validated 3200/6318 (~50.65%), and stays
#     a clean multiple of fisher_ema_interval=200 (7200/200=36), matching the
#     original config's property that the freeze event coincides with an EMA
#     update step. Leaving freeze_interval at 3200 unchanged would have fired
#     FOUR events (multiples of 3200 up to 14040: 3200, 6400, 9600, 12800) --
#     exactly the compounding-collapse failure mode this config's whole design
#     exists to avoid.
#   - num_workers 2 -> 6: more CPU cores available per GPU on a cluster node than
#     on the local dev machine; not a scientific hyperparameter, pure throughput.
#   - Everything else (batch_size, learning_rate, js_variance_lambda, etc.)
#     intentionally unchanged from the validated local config -- changing them
#     too would invalidate the tuning trail in docs/fisheradaptune_freeze_experiments.md.

# Data
data_root: dataset
seed: 0
batch_size: 128
num_workers: 6

# Model
vit:
  patch_size: 4
  embed_dim: 192
  depth: 6
  num_heads: 3
  mlp_ratio: 4.0
  drop: 0.1

# Training
num_epochs: 40
learning_rate: 3.0e-4
weight_decay: 5.0e-5
early_stopping_patience: 12
output_dir: runs

# Fisher / freeze -- see the header comment above for what changed and why;
# see config_vit_small.yaml for the full validated rationale on the values
# that didn't change.
fisher_ema_interval: 200
freeze_interval: 7200
fisher_slice_mode: row
fisher_slice_blocks: 4
js_distance_mode: log
chunk_selection_metric: total_variation
js_variance_lambda: -1.0

# W&B (optional, unused by default in this benchmark script)
wandb_project: FisherAdapTune-CIFAR10
