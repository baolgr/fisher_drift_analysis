# CIFAR-10 benchmark config -- ResNet50, cluster variant, MULTI-FREEZE variant
# of the mean_js sweep run (config_resnet50_cluster_sweep_meanjs.yaml:
# mean_js, js_variance_lambda=-1.0, 99.93% accuracy relative to nofreeze at
# 27.2% params retained -- the other "most promising" ResNet50 config per
# docs/2026-07-20_overnight_batch_analysis.md §2/§5 point 2, alongside
# lambda13 above).
#
# Same reasoning as config_resnet50_cluster_sweep_lambda13_multifreeze.yaml
# (read that file's header first): freeze_interval 7200 -> 4000 for 3 freeze
# events (steps 4000/8000/12000) within the unchanged 40-epoch budget.
#
# Risk assessed before submitting: this config's single-event ancestor froze
# a larger fraction than lambda13's (168/644=26.1% of chunks in one shot),
# so the cumulative extrapolation is more aggressive -- roughly
# 644*(1-0.261)^3=260 chunks retained (~40%) after 3 events, vs the
# single-event run's 476 (73.9%). Still comparable in magnitude to the
# already-validated single-event total_variation baseline (32.8% retained,
# 99.67% accuracy) rather than the catastrophic collapse seen at
# lambda=-0.4 (0.5% retained) -- plausible this stays safe, but the largest
# extrapolation uncertainty of the 4 multi-freeze configs in this batch;
# check the actual [Freeze] print lines and relative_update.png after this
# run before trusting the projection.
#
# run_name -> runs/resnet50_freeze_sweep_meanjs_multifreeze/ (does not
# overwrite runs/resnet50_freeze_sweep_meanjs/, the single-event run this is
# compared against).

# Data
data_root: dataset
seed: 0
batch_size: 128
num_workers: 6

# Training
num_epochs: 40
learning_rate: 3.0e-4
weight_decay: 5.0e-5
early_stopping_patience: 12
output_dir: runs
run_name: resnet50_freeze_sweep_meanjs_multifreeze

# Fisher / freeze -- freeze_interval lowered from 7200 to 4000 for 3 freeze
# events instead of 1 (see header). chunk_selection_metric/js_variance_lambda
# unchanged from config_resnet50_cluster_sweep_meanjs.yaml.
fisher_ema_interval: 200
freeze_interval: 4000
fisher_slice_mode: row
fisher_slice_blocks: 4
js_distance_mode: log
chunk_selection_metric: mean_js
js_variance_lambda: -1.0

# W&B (optional, unused by default in this benchmark script)
wandb_project: FisherAdapTune-CIFAR10
