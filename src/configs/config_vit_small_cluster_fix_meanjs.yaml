# CIFAR-10 benchmark config -- small ViT, cluster variant, FIX ATTEMPT #1: mean_js.
#
# Identical to config_vit_small_cluster.yaml (40 epochs, freeze_interval=7200,
# js_variance_lambda=-1.0) except for ONE change: chunk_selection_metric
# total_variation -> mean_js. Rationale (full trail in
# docs/2026-07-19_vit_cluster_run_curve_analysis.md §6): the real
# runs/vit_small_freeze run (recovered from slurm/logs/vit_freeze-16724978.out)
# froze only 127/408 chunks (31%) by count but 90.8% of trainable *params* --
# i.e. it systematically froze large weight-matrix chunks and spared small
# ones (biases/LayerNorm, ~192 elements). total_variation is a cumulative SUM
# of absolute per-EMA-update JS deltas -- it never cancels measurement noise,
# it accumulates it, and small chunks' noisier JS histograms (64 bins on ~192
# elements, per fisheradaptune_freeze_collapse_bug in memory) inflate their
# score more with every extra EMA update. At 40 epochs there are 36 EMA
# updates (7200/200) before the freeze decision vs. ~16 at 18 epochs -- twice
# the noise-accumulation window, which this config's whole design (equal
# lambda, equal relative timing) didn't account for. mean_js
# (self._chunk_js_sum / self._chunk_js_count, see trainer.py:302-306) is an
# AVERAGE of JS readings, not a sum -- it doesn't grow with the number of EMA
# updates observed, so it should be far less sensitive to how long training
# ran before the freeze decision. Only this one knob changes here, to isolate
# its effect from the lambda sweep (config_vit_small_cluster_fix_lambda13/16.yaml)
# -- same one-variable-at-a-time discipline as the original v0-v5 tuning trail
# in docs/fisheradaptune_freeze_experiments.md.
#
# run_name gives this run its own flat runs/vit_small_freeze_fix_meanjs/
# directory (train.py change, see src/train.py's run_training) so it can run
# concurrently with the other fix attempts and vit_small_freeze/vit_small_nofreeze
# without colliding, and so scripts/compare_runs.py picks it up directly.

# Data
data_root: dataset
seed: 0
batch_size: 128
num_workers: 6

# Model
vit:
  patch_size: 4
  embed_dim: 192
  depth: 6
  num_heads: 3
  mlp_ratio: 4.0
  drop: 0.1

# Training
num_epochs: 40
learning_rate: 3.0e-4
weight_decay: 5.0e-5
early_stopping_patience: 12
output_dir: runs
run_name: vit_small_freeze_fix_meanjs

# Fisher / freeze -- only chunk_selection_metric changed from the validated
# cluster config, see header comment above.
fisher_ema_interval: 200
freeze_interval: 7200
fisher_slice_mode: row
fisher_slice_blocks: 4
js_distance_mode: log
chunk_selection_metric: mean_js
js_variance_lambda: -1.0

# W&B (optional, unused by default in this benchmark script)
wandb_project: FisherAdapTune-CIFAR10
