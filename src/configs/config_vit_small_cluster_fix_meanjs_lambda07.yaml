# CIFAR-10 benchmark config -- small ViT, cluster variant, mean_js metric at
# a MORE aggressive threshold: js_variance_lambda=-0.7 (vs. -1.0 in
# fix_meanjs, vs. -1.3 in the combined fix_meanjs_lambda13).
#
# Not a bug-fix attempt like the other configs in this sweep -- an
# understanding probe. `fix_meanjs` (lambda=-1.0) is the only run so far
# that freezes attention chunks with an early-vs-late split (report §3 point
# 2: blocks.0/.2 attention frozen, blocks.5 attention spared) -- exactly the
# axis plan.md point 7 asks to characterize ("surveiller ... précoce vs
# tardive ... attention"). This config asks whether that split is a robust
# property of mean_js (holds across lambda, i.e. a real signal about which
# attention layers stabilize first) or an artifact of landing near lambda=
# -1.0 specifically (disappears or reverses at a different threshold on the
# same metric). Paired with fix_meanjs_lambda13 (-1.3, less aggressive) in
# the same overnight batch, this (-0.7, more aggressive) gives two points on
# either side of the already-run -1.0 for the same chunk_selection_metric.
#
# Everything else identical to config_vit_small_cluster.yaml (40 epochs,
# freeze_interval=7200).
#
# run_name gives this its own flat runs/vit_small_freeze_fix_meanjs_lambda07/
# directory (see src/train.py's run_training).

# Data
data_root: dataset
seed: 0
batch_size: 128
num_workers: 6

# Model
vit:
  patch_size: 4
  embed_dim: 192
  depth: 6
  num_heads: 3
  mlp_ratio: 4.0
  drop: 0.1

# Training
num_epochs: 40
learning_rate: 3.0e-4
weight_decay: 5.0e-5
early_stopping_patience: 12
output_dir: runs
run_name: vit_small_freeze_fix_meanjs_lambda07

# Fisher / freeze -- chunk_selection_metric changed (mean_js) and
# js_variance_lambda pushed more aggressive than the already-run fix_meanjs
# (-1.0), see header comment above.
fisher_ema_interval: 200
freeze_interval: 7200
fisher_slice_mode: row
fisher_slice_blocks: 4
js_distance_mode: log
chunk_selection_metric: mean_js
js_variance_lambda: -0.7

# W&B (optional, unused by default in this benchmark script)
wandb_project: FisherAdapTune-CIFAR10
