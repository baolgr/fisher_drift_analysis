# CIFAR-10 benchmark config -- small ViT, cluster variant, FIX ATTEMPT #2: lambda=-1.3.
#
# Identical to config_vit_small_cluster.yaml (40 epochs, freeze_interval=7200,
# chunk_selection_metric=total_variation) except for ONE change:
# js_variance_lambda -1.0 -> -1.3. Rationale (full trail in
# docs/2026-07-19_vit_cluster_run_curve_analysis.md §6): the real
# runs/vit_small_freeze run froze 90.8% of trainable params at lambda=-1.0
# (threshold = mean - std = 0.3217, with mean=0.5744 std=0.2527 -- see the
# recovered [Freeze] print in that section). A more negative lambda lowers
# the threshold further (mean - 1.3*std = ~0.245), which should let more of
# the surviving-candidate population clear the bar even without touching the
# noise-accumulation mechanism itself (that's what
# config_vit_small_cluster_fix_meanjs.yaml targets instead) -- this config
# isolates the lambda effect alone, same metric as the original run, so the
# two fixes can be compared independently before considering combining them.
# -1.3 is already past the paper's own validated Appendix B.2 range
# (-0.85 to -0.95, see config_vit_small.yaml's header) -- expected, since -1.0
# was already "just past their optimum on the retain-more side" for the
# 18-epoch config and this run needs to retain even more given the longer
# accumulation window; treat this as this project's own from-scratch/
# long-schedule empirical territory, not a literature-backed value.
#
# run_name gives this run its own flat runs/vit_small_freeze_fix_lambda13/
# directory (see src/train.py's run_training) so it can run concurrently with
# the other fix attempts and vit_small_freeze/vit_small_nofreeze without
# colliding, and so scripts/compare_runs.py picks it up directly.

# Data
data_root: dataset
seed: 0
batch_size: 128
num_workers: 6

# Model
vit:
  patch_size: 4
  embed_dim: 192
  depth: 6
  num_heads: 3
  mlp_ratio: 4.0
  drop: 0.1

# Training
num_epochs: 40
learning_rate: 3.0e-4
weight_decay: 5.0e-5
early_stopping_patience: 12
output_dir: runs
run_name: vit_small_freeze_fix_lambda13

# Fisher / freeze -- only js_variance_lambda changed from the validated
# cluster config, see header comment above.
fisher_ema_interval: 200
freeze_interval: 7200
fisher_slice_mode: row
fisher_slice_blocks: 4
js_distance_mode: log
chunk_selection_metric: total_variation
js_variance_lambda: -1.3

# W&B (optional, unused by default in this benchmark script)
wandb_project: FisherAdapTune-CIFAR10
