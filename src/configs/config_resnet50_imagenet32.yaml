# Downsampled ImageNet (32x32) benchmark config -- ResNet50 (from scratch, AdamW)
#
# UNVERIFIED STARTING POINT, more so than the CIFAR-100 configs. Every
# step-count-based knob below (num_epochs, freeze_interval, early_stopping_patience)
# is copied unchanged from config_resnet50.yaml and is almost certainly wrong:
# ImageNet32's train pool (~1.28M images for the full 1000-class variant) is
# ~25x CIFAR's 45k, so steps_per_epoch and total_steps are both ~25x larger --
# a freeze_interval tuned to land a single cut at ~2/3 through CIFAR's 6318-step
# schedule lands nowhere near the equivalent point of a ~155k-step ImageNet32
# epoch count. Recompute freeze_interval (target: total_steps/2 < freeze_interval
# < total_steps, see config_vit_small.yaml's rationale comment for why) once the
# real dataset is staged and steps_per_epoch is known -- do NOT run as-is and
# trust the result.
#
# val_size: also a placeholder -- see src/data/imagenet32.py's docstring, this
# loader has no CIFAR-sized default given the much larger pool and requires an
# explicit value.

# Data
dataset: imagenet32
num_classes: 1000
data_root: dataset/imagenet32
val_size: 10000
seed: 0
batch_size: 128
num_workers: 2

# Training
num_epochs: 18
learning_rate: 3.0e-4
weight_decay: 5.0e-5
early_stopping_patience: 12
output_dir: runs

# Fisher / freeze -- UNVERIFIED placeholders, copied from config_resnet50.yaml.
# See header comment above -- freeze_interval in particular needs recomputing
# against real steps_per_epoch before this config is trusted.
fisher_ema_interval: 200
freeze_interval: 3200
fisher_slice_mode: row
fisher_slice_blocks: 4
js_distance_mode: log
chunk_selection_metric: total_variation
js_variance_lambda: -1.0

# W&B (optional, unused by default in this benchmark script)
wandb_project: FisherAdapTune-ImageNet32
